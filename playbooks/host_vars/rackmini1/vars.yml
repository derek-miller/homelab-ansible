# Primary admin/desktop user on this Mac (see macos group_vars for details
# on what this controls).
mac_user: rackmini

sudoers:
  - user: rackmini
    passwordless: true

# Override the macos group default of GMT — rackmini1 is a workstation +
# user-facing host (Plex, Homebridge), so keep its clock in local time.
timezone: America/Chicago

tailscale_args: --accept-routes

# /mnt synthetic link — lets the smb-mount role expose unas shares at
# /mnt/{Backups,Container,Public} (macOS's sealed system volume can't
# create root-level dirs without this; see common role).
mac_synthetic_links:
  mnt: /System/Volumes/Data/mnt

# Homebridge UI binds directly to 443 on this host (TLS certs referenced
# in ~/.homebridge/config.json), so homebridge.dmiller.me resolves without
# an explicit port.
homebridge_ui_port: 443

