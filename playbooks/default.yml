- name: set up connection before gathering facts
  hosts: all
  gather_facts: no
  roles:
    - ansible/setup/connection
  tags:
    - always

- name: connect and gather facts
  hosts: all
  tasks:
    - name: node summary
      debug:
        msg: >-
          {{ ansible_all_ipv4_addresses | join(' ') }},
          {{ ansible_distribution }} {{ ansible_distribution_version }},
          {{ ansible_processor_vcpus }} CPU(s),
          {{ ansible_memtotal_mb }} MB memory
  tags:
    - always
    - connect

- name: bootstrap connection credentials
  hosts: all
  roles:
    - role: ansible/setup/bootstrap
      when: bootstrap|default(false)|bool
  tags:
    - bootstrap

- name: set up ansible environment on remote
  hosts: all
  roles:
    - ansible/remote
  tags:
    - always
    - base-setup  # not part of base tag since really a setup task but needs apt mirrors, etc. from previous base plays
    - ansible-remote

- name: common
  hosts: all
  roles:
    - common
  tags:
    - always
    - base
    - common

- name: telegraf
  hosts: all
  roles:
    - generic/telegraf
    - generic/telegraf-syslog
  tags:
    - telegraf

- hosts: raspberry-pi
  roles:
    - role: generic/raspberry-pi
  tags:
    - raspberry-pi

- hosts: uctronics-lcd
  roles:
    - role: generic/uctronics-lcd
  tags:
    - uctronics-lcd

- hosts: tailscale
  roles:
    - role: artis3n.tailscale.machine
  tasks:
    - name: get tailscale ip addresses
      command: tailscale ip
      changed_when: false
      register: tailscale_ip_result
    - name: set tailscale ip address vars
      set_fact:
        tailscale_ip4_address: "{{ tailscale_ip_result.stdout_lines[0] }}"
        tailscale_ip6_address: "{{ tailscale_ip_result.stdout_lines[1] }}"
    - name: add Cloudflare DNS record for tailscale ipv4 address
      community.general.cloudflare_dns:
        zone: "{{ cloudflare_zone }}"
        account_email: "{{ cloudflare_email }}"
        account_api_token: "{{ cloudflare_api_key }}"
        type: "A"
        record: "{{ inventory_hostname }}.ts"
        value: "{{ tailscale_ip4_address }}"
        ttl: 1
        proxied: no
        solo: yes
      when: create_cloudflare_ipv4_dns_record is defined and create_cloudflare_ipv4_dns_record is truthy
    - name: add Cloudflare DNS record for tailscale ipv6 address
      community.general.cloudflare_dns:
        zone: "{{ cloudflare_zone }}"
        account_email: "{{ cloudflare_email }}"
        account_api_token: "{{ cloudflare_api_key }}"
        type: "AAAA"
        record: "{{ inventory_hostname }}.ts"
        value: "{{ tailscale_ip6_address }}"
        ttl: 1
        proxied: no
        solo: yes
      when: create_cloudflare_ipv6_dns_record is defined and create_cloudflare_ipv6_dns_record is truthy
  tags:
    - tailscale

- hosts: cifs-shares
  roles:
    - role: generic/systemd-cifs-mount
      cifs_share_host: "{{ cifs_shares_host_configs[cifs_shares_host_config].host }}"
      cifs_share_username: "{{ cifs_shares_host_configs[cifs_shares_host_config].username }}"
      cifs_share_password: "{{ cifs_shares_host_configs[cifs_shares_host_config].password }}"
      cifs_credentials_path: "/etc/.{{ cifs_shares_host_config }}_cifs_creds"
      cifs_mount_dir: /mnt
      cifs_mount_options: "{{ cifs_shares_host_configs[cifs_shares_host_config].mount_options }}"
  tags:
    - cifs
    - cifs-shares

- hosts: project-files
  roles:
    - role: generic/project-files
  tags:
    - project-files

- hosts: ser2net
  roles:
    - role: generic/ser2net
  tags:
    - ser2net

- hosts: docker
  roles:
    - role: galaxy/docker
      # Necessary so telegraf can read from the socket
      docker_users: "{{ additional_docker_users|default([]) + ['telegraf'] }}"
      tags:
        - docker-daemon
    - role: generic/docker-stats
      docker_stats_state: "{{ 'present' if docker_service_enabled else 'absent' }}"
      tags:
        - docker-stats
  tags:
    - docker

- hosts: docker
  tasks:
    - name: log in to Docker Hub
      community.docker.docker_login:
        username: "{{ docker_hub_username }}"
        password: "{{ docker_hub_password }}"
      when: docker_hub_username is defined and docker_hub_password is defined
    - name: log out of Docker Hub
      community.docker.docker_login:
        state: absent
      when: docker_hub_username is not defined or docker_hub_password is not defined
  tags:
    - docker
    - docker-swarm
    - docker-compose
    - docker-build-images

- hosts: docker_swarm_manager:docker_swarm_worker
  roles:
    - role: galaxy/docker-swarm
  tags:
    - docker
    - docker-swarm

- hosts: docker
  pre_tasks:
    - name: drain node before volume restore
      command: "docker node update --availability drain {{ inventory_hostname }}"
      delegate_to: "{{ groups['docker_swarm_manager'][0] }}"
      when:
        - docker_restore_volumes | default(false) | bool
        - "'docker_swarm_manager' in group_names or 'docker_swarm_worker' in group_names"
  roles:
    - role: generic/docker/restore-volumes
      when: docker_restore_volumes | default(false) | bool
  post_tasks:
    - name: activate node after volume restore
      command: "docker node update --availability active {{ inventory_hostname }}"
      delegate_to: "{{ groups['docker_swarm_manager'][0] }}"
      when:
        - docker_restore_volumes | default(false) | bool
        - "'docker_swarm_manager' in group_names or 'docker_swarm_worker' in group_names"
  tags:
    - docker
    - docker-restore-volumes

- hosts: docker-build-images
  roles:
    - role: generic/docker/build-images
  tags:
    - docker
    - docker-build-images

- hosts: docker_swarm_manager[0]
  tasks:
    - name: deploy docker stack
      when: docker_stack_definition is defined
      docker_stack:
        state: "{{ docker_stack_state|default('present') }}"
        name: "{{ docker_stack_name|default(inventory_hostname) }}"
        prune: yes
        compose:
          - "{{ docker_stack_definition }}"
      tags:
        - docker-stack

  tags:
    - docker
    - docker-swarm

- hosts: docker
  tasks:
    - name: create docker containers
      when: docker_compose_definition is defined
      block:
        - name: create docker containers (parallel pull)
          community.docker.docker_compose_v2:
            docker_cli: "{{ docker_cli|default(omit) }}"
            state: "{{ docker_compose_state|default('present') }}"
            remove_images: all
            remove_volumes: yes
            remove_orphans: yes
            project_name: "{{ docker_compose_project_name|default(inventory_hostname) }}"
            definition: "{{ docker_compose_definition }}"
            pull: always
      rescue:
        - name: fail if not a rate limit error
          fail:
            msg: "{{ ansible_failed_result.msg }}"
          when: "'toomanyrequests' not in (ansible_failed_result.msg | default(''))"

        - name: pull docker images sequentially (rate limit fallback)
          community.docker.docker_image:
            name: "{{ item.value.image }}"
            source: pull
            force_source: true
          loop: "{{ docker_compose_definition.services | dict2items }}"
          loop_control:
            label: "{{ item.value.image }}"
            pause: 5
          retries: 3
          delay: 60
          register: docker_pull_result
          until: docker_pull_result is not failed

        - name: create docker containers (images pre-pulled)
          community.docker.docker_compose_v2:
            docker_cli: "{{ docker_cli|default(omit) }}"
            state: "{{ docker_compose_state|default('present') }}"
            remove_images: all
            remove_volumes: yes
            remove_orphans: yes
            project_name: "{{ docker_compose_project_name|default(inventory_hostname) }}"
            definition: "{{ docker_compose_definition }}"
            pull: never
  tags:
    - docker
    - docker-compose

- name: prune unused docker resources
  hosts: docker
  tasks:
    - name: prune stopped containers, unused images, networks, and volumes
      community.docker.docker_prune:
        containers: yes
        images: yes
        images_filters:
          dangling: "false"
        networks: yes
        volumes: yes
        builder_cache: yes
        timeout: 300
  tags:
    - docker
    - docker-prune

- hosts: x11vnc
  roles:
    - role: generic/x11vnc
  tags:
    - x11vnc

- hosts: network-ups-tools
  roles:
    - role: generic/network-ups-tools
    - role: generic/network-ups-tools-stats
  tags:
    - network-ups-tools

- hosts: tplink-plug-stats
  roles:
    - role: generic/tplink-plug-stats
  tags:
    - tplink-plug-stats

- hosts: sysdweb
  roles:
    - role: generic/sysdweb
  tags:
    - sysdweb
