# Tailscale absent — fully reverse what the setup-* files did:
#   - tailscale logout + down (disconnect from tailnet)
#   - bootout + remove LaunchDaemon plist (Darwin)
#   - brew uninstall + remove /usr/local/bin symlink (Darwin)
#   - on Linux, delegate to artis3n with state=absent

- name: locate tailscale CLI
  shell: command -v tailscale 2>/dev/null || true
  register: _tailscale_bin
  changed_when: false

- name: tailscale logout (disconnect from tailnet)
  command: "{{ _tailscale_bin.stdout }} logout"
  when: _tailscale_bin.stdout | length > 0
  failed_when: false
  changed_when: true

- name: tailscale down (stop advertising)
  command: "{{ _tailscale_bin.stdout }} down"
  when: _tailscale_bin.stdout | length > 0
  failed_when: false
  changed_when: true

# ---- Linux teardown ----------------------------------------------------
- name: uninstall tailscale (Linux)
  include_role:
    name: artis3n.tailscale.machine
  vars:
    tailscale_up_skip: true
    state: absent
  when: ansible_os_family != 'Darwin'

# ---- Darwin teardown ---------------------------------------------------
- name: Darwin teardown block
  when: ansible_os_family == 'Darwin'
  block:
    - name: bootout tailscaled LaunchDaemon
      command: launchctl bootout system/homebrew.mxcl.tailscale
      become: yes
      failed_when: false
      changed_when: true

    - name: remove /Library/LaunchDaemons/homebrew.mxcl.tailscale.plist
      file:
        path: /Library/LaunchDaemons/homebrew.mxcl.tailscale.plist
        state: absent
      become: yes

    - name: remove /usr/local/bin/tailscale symlink
      file:
        path: /usr/local/bin/tailscale
        state: absent
      become: yes

    - name: switch become_user to mac_user (brew refuses root)
      set_fact:
        ansible_become_user: "{{ mac_user | mandatory }}"

    - block:
        - name: brew uninstall tailscale
          community.general.homebrew:
            name: tailscale
            state: absent
      always:
        - name: restore become_user to root
          set_fact:
            ansible_become_user: root
