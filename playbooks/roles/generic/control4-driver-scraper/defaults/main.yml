---
control4_driver_scraper_state: present

# Image built locally on the host by generic/docker/build-images (see
# available_docker_images.control4-driver-scraper). Never pulled from a
# registry; rebuild with `make run tags=docker-build-images -e force_rebuild=true`.
control4_driver_scraper_image: control4-driver-scraper
control4_driver_scraper_image_tag: latest

# Host paths bind-mounted into the container. sources_dir must be the same
# tree sourcebot bind-mounts into /repos/* (see vault_docker_stack_definition
# in host_vars/rackpi1/vault.yml); drivers_dir is a raw-download cache that
# lets reruns skip drivers whose on-disk version is already current.
control4_driver_scraper_drivers_dir: /mnt/data/Drivers
control4_driver_scraper_sources_dir: /mnt/data/Source

# systemd calendar expression (systemd.time(7)) for the refresh timer.
# Overlap is impossible by construction: a timer never triggers its unit
# while a previous invocation is still running.
control4_driver_scraper_on_calendar: "*-*-* 05:15:00"

control4_driver_scraper_service: control4-driver-scraper
