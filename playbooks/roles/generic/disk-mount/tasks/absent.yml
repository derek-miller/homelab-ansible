# disk-mount absent — reverse what present.yml did:
#   - unmount each configured path
#   - remove the fstab entry
#   - remove the (now-empty) mount-point dir

- name: unmount + remove fstab entry for each disk
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: "{{ item.fstype }}"
    state: absent
  loop: "{{ disk_mounts }}"
  loop_control:
    label: "{{ item.path }}"

- name: remove mount-point dirs (only if empty)
  # rmdir, not file:state=absent, so we don't clobber a dir that still
  # contains data (e.g., if something wrote there while unmounted).
  command: "rmdir {{ item.path | quote }}"
  loop: "{{ disk_mounts }}"
  loop_control:
    label: "{{ item.path }}"
  failed_when: false
  changed_when: true
