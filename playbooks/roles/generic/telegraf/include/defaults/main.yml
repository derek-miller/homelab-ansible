telegraf_state: present
telegraf_collection_interval: 10s
telegraf_collection_jitter: 0s
telegraf_flush_interval: "{{ telegraf_collection_interval }}"
telegraf_flush_jitter: 5s
telegraf_conf: /etc/telegraf/telegraf.conf
telegraf_conf_dir: /etc/telegraf/telegraf.d
telegraf_apt_dependencies:
  - lm-sensors

# PATH injected into the macOS LaunchAgent plist's EnvironmentVariables
# so /usr/sbin tools (notably `ntpq`, required by [[inputs.ntpq]]) are
# resolvable. brew's plist ships only HOME and relies on launchd's
# defaults which don't include /usr/sbin in all session types.
telegraf_darwin_path: /usr/sbin:/usr/bin:/bin:/opt/homebrew/bin:/opt/homebrew/sbin
