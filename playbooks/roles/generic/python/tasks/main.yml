- assert:
    that: python_state == 'present'
    quiet: yes

- name: set up pip3 and virtualenv (apt-based)
  when: ansible_os_family == 'Debian'
  block:
    - name: install pip3
      apt:
        name: python3-pip
        state: latest

    - name: probe pip3 presence (always passes --disable-pip-version-check below)
      # pip gained --disable-pip-version-check in 6.0 (released 2015). Every
      # host in this inventory runs pip far newer than that, so there's no
      # point in gating the flag on a version comparison — `changed=false`
      # here makes the downstream extra_args expression unconditionally
      # emit --disable-pip-version-check.
      command: pip3 --version
      register: pip_no_disable_pip_version_check
      changed_when: false

    - name: check if pip3 needs break-system-packages flag
      command: pip3 install --help
      register: pip_break_system_packages_check
      changed_when: false

    - name: set pip_break_system_packages var
      set_fact:
        pip_break_system_packages: "{{ ' --break-system-packages ' in pip_break_system_packages_check.stdout }}"

    - name: upgrade/downgrade setuptools and pip
      pip:
        name:
          - setuptools{{ setuptools_version_spec }}
          - pip{{ pip_version_spec }}
        executable: pip3
        extra_args: "{{ '--break-system-packages' if pip_break_system_packages else '' }} {{ '' if pip_no_disable_pip_version_check is changed else '--disable-pip-version-check' }}"
        state: latest
      when: >-
        not (ansible_distribution == 'Ubuntu' and ansible_distribution_major_version | int >= 24)
        and not (ansible_distribution == 'Debian' and ansible_distribution_major_version | int >= 12)

    - name: install/upgrade virtualenv
      pip:
        name: virtualenv{{ virtualenv_version_spec }}
        executable: pip3
        extra_args: "{{ '--break-system-packages' if pip_break_system_packages else '' }} --disable-pip-version-check"
        state: latest

- name: install Python via Homebrew (macOS)
  # Apple's /usr/bin/python3 is pinned at 3.9 (EOL); build the remote venv from a
  # Homebrew interpreter instead so it tracks the same dependency versions as the
  # Linux hosts. generic/virtualenv passes `{{ darwin_venv_python }} -m venv`.
  when: ansible_os_family == 'Darwin'
  # The connection role set_facts ansible_become_user=root as a host fact, and
  # set_fact outranks block vars, so swap the fact around the brew call (Homebrew
  # refuses root) and restore it after — same pattern as the common role.
  block:
    - name: switch become_user to mac_user
      set_fact:
        ansible_become_user: "{{ mac_user | mandatory }}"
    - name: install Homebrew Python formula
      community.general.homebrew:
        name: "{{ darwin_python_formula }}"
        state: present
  always:
    - name: restore become_user to root
      set_fact:
        ansible_become_user: root
