- assert:
    that:
      - smb_mounts is defined
      - smb_mounts | map(attribute='shares') | flatten
          | rejectattr('mount_point', 'defined') | list | length == 0
    fail_msg: >-
      smb_mounts must be defined with each share entry as
      {name: <share>, mount_point: <path>}. See role defaults.
    quiet: yes

# ---- ensure mount_point parents exist ----------------------------------
# autofs creates the leaf trigger at mount_point itself, but NOT any
# intermediate path components. e.g. for /mnt/foo/Backups, autofs makes
# /mnt/foo/Backups (the trigger) but needs /mnt/foo to pre-exist. /mnt is
# typically provided by the common role's mac_synthetic_links; anything
# deeper is this role's responsibility.
- name: ensure mount_point parent dirs exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: wheel
    mode: '0755'
  loop: "{{ smb_mounts | map(attribute='shares') | flatten
            | map(attribute='mount_point') | map('dirname') | unique | list }}"

# ---- autofs map --------------------------------------------------------
- name: install autofs SMB direct map
  template:
    src: auto_smb.j2
    dest: "{{ smb_mount_map_path }}"
    owner: root
    group: wheel
    mode: '0600'
  notify: reload autofs

# ---- register the direct map in /etc/auto_master -----------------------
# autofs only reads the map file when /etc/auto_master carries a direct-map
# line pointing at it. The role runs as root over SSH (ansible_become_user
# is root for this host), and that context can write /etc/auto_master
# directly — verified on-host. (An earlier version used a boot LaunchDaemon
# to do this write, on the mistaken belief that an SSH/become context could
# not. The real blocker for the daemon was its own lack of Full Disk Access,
# not the SSH path; the daemon and its plist/script/newsyslog config have
# been removed.)
#
# NOTE: macOS OS updates reset /etc/auto_master to the stock default and
# strip this line. Re-running this role restores it, which is already part
# of bringing a Mac back after an update.
- name: register auto_smb direct map in /etc/auto_master
  lineinfile:
    path: /etc/auto_master
    regexp: '^/-[[:space:]]+{{ smb_mount_map_path | basename }}[[:space:]]*$'
    line: "/-\t{{ smb_mount_map_path | basename }}"
    state: present
    owner: root
    group: wheel
    mode: '0644'
  notify: reload autofs
