- assert:
    that:
      - smb_mounts is defined
      - smb_mounts | map(attribute='shares') | flatten
          | rejectattr('mount_point', 'defined') | list | length == 0
    fail_msg: >-
      smb_mounts must be defined with each share entry as
      {name: <share>, mount_point: <path>}. See role defaults.
    quiet: yes

# ---- ensure mount_point parents exist ----------------------------------
# autofs creates the leaf trigger at mount_point itself, but NOT any
# intermediate path components. e.g. for /mnt/foo/Backups, autofs makes
# /mnt/foo/Backups (the trigger) but needs /mnt/foo to pre-exist. /mnt is
# typically provided by the common role's mac_synthetic_links; anything
# deeper is this role's responsibility.
- name: ensure mount_point parent dirs exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: wheel
    mode: '0755'
  loop: "{{ smb_mounts | map(attribute='shares') | flatten
            | map(attribute='mount_point') | map('dirname') | unique | list }}"

# ---- autofs map --------------------------------------------------------
- name: install autofs SMB direct map
  template:
    src: auto_smb.j2
    dest: "{{ smb_mount_map_path }}"
    owner: root
    group: wheel
    mode: '0600'
  register: _smb_map

# ---- /etc/auto_master fixup LaunchDaemon -------------------------------
# Ansible-over-SSH cannot write /etc/auto_master — sshd's sandbox profile
# on macOS blocks it. Workaround: a small LaunchDaemon that runs at boot
# in launchd's process tree (NOT sshd's), appends the direct-map line to
# /etc/auto_master if missing, and reloads autofs. Same daemon also self-
# heals after macOS OS updates, which periodically reset /etc/auto_master
# to the stock system default. Triggering the daemon (via bootstrap or
# kickstart) drives the write on demand so the role is self-contained.
- name: ensure /usr/local/sbin exists
  file:
    path: /usr/local/sbin
    state: directory
    owner: root
    group: wheel
    mode: '0755'

- name: install /etc/auto_master fixup script
  template:
    src: smb-mount-fixup.sh.j2
    dest: "{{ smb_mount_fixup_script }}"
    owner: root
    group: wheel
    mode: '0755'
  register: _fixup_script

- name: install /etc/auto_master fixup LaunchDaemon plist
  template:
    src: smb-mount-fixup.plist.j2
    dest: "{{ smb_mount_fixup_plist }}"
    owner: root
    group: wheel
    mode: '0644'
  register: _fixup_plist

- name: check if fixup LaunchDaemon is loaded
  command: "launchctl print system/{{ smb_mount_fixup_label }}"
  register: _fixup_loaded
  changed_when: false
  failed_when: false

- name: bootstrap fixup LaunchDaemon (first-time)
  # Bootstrap loads the daemon into launchd's system domain and triggers
  # RunAtLoad — the script fires once, appends the line to /etc/auto_master
  # if missing, and reloads autofs.
  command: "launchctl bootstrap system {{ smb_mount_fixup_plist }}"
  when: _fixup_loaded.rc != 0
  changed_when: true
  register: _fixup_bootstrap

- name: reload fixup LaunchDaemon (inputs changed)
  # Plist, script, or map changed — bootout and re-bootstrap so RunAtLoad
  # fires again under the new config.
  when:
    - _fixup_loaded.rc == 0
    - _fixup_plist is changed or _fixup_script is changed or _smb_map is changed
  block:
    - command: "launchctl bootout system/{{ smb_mount_fixup_label }}"
      changed_when: true
    - command: "launchctl bootstrap system {{ smb_mount_fixup_plist }}"
      changed_when: true

- name: verify /etc/auto_master has map entry
  # Daemon runs async via launchd, so retry briefly while the script
  # completes its append + automount reload.
  command: "/usr/bin/grep -qE '^/-[[:space:]]+{{ smb_mount_map_path | basename }}$' /etc/auto_master"
  register: _automaster_verify
  retries: 10
  delay: 1
  until: _automaster_verify.rc == 0
  changed_when: false
