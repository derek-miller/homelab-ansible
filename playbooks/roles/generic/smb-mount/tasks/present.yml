- assert:
    that:
      - smb_mounts is defined
      - smb_mounts | map(attribute='shares') | flatten
          | rejectattr('mount_point', 'defined') | list | length == 0
    fail_msg: >-
      smb_mounts must be defined with each share entry as
      {name: <share>, mount_point: <path>}. See role defaults.
    quiet: yes

# ---- ensure mount_point parents exist ----------------------------------
# autofs creates the leaf trigger at mount_point itself, but NOT any
# intermediate path components. e.g. for /mnt/foo/Backups, autofs makes
# /mnt/foo/Backups (the trigger) but needs /mnt/foo to pre-exist. /mnt is
# typically provided by the common role's mac_synthetic_links; anything
# deeper is this role's responsibility.
- name: ensure mount_point parent dirs exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: wheel
    mode: '0755'
  loop: "{{ smb_mounts | map(attribute='shares') | flatten
            | map(attribute='mount_point') | map('dirname') | unique | list }}"

# ---- autofs map --------------------------------------------------------
# This part IS writable over SSH — only /etc/auto_master itself is not.
- name: install autofs SMB direct map
  template:
    src: auto_smb.j2
    dest: "{{ smb_mount_map_path }}"
    owner: root
    group: wheel
    mode: '0600'
  notify: reload autofs

# ---- register the direct map in /etc/auto_master (manual step) ---------
# See defaults/main.yml: no automatable mechanism can write
# /etc/auto_master on this host. Detect whether the line is there and
# pause with the exact command when it's missing, rather than pretending
# an automated fix is possible.
- name: probe /etc/auto_master for map entry
  command: "grep -qE '^/-[[:space:]]+{{ smb_mount_map_path | basename }}$' /etc/auto_master"
  register: _automaster_probe
  changed_when: false
  failed_when: false

- name: prompt user to add map line to /etc/auto_master via GUI Terminal
  pause:
    seconds: 600
    prompt: |

      =====================================================================
      MANUAL STEP REQUIRED — add autofs map line to /etc/auto_master
      =====================================================================

      Writing /etc/auto_master fails over SSH on this host (and even from
      a boot-time LaunchDaemon) — only an interactive local Terminal.app
      session can do it. In a Terminal.app window on the Mac (NOT over
      SSH), paste:

        printf '/-\t{{ smb_mount_map_path | basename }}\n' | sudo tee -a /etc/auto_master && sudo /usr/sbin/automount -vc

      Then press Enter here to continue. Timing out after 10 minutes.
  when: _automaster_probe.rc != 0

- name: reload autofs
  command: /usr/sbin/automount -vc
  changed_when: true
  when: _automaster_probe.rc != 0

- name: verify /etc/auto_master has map entry
  command: "/usr/bin/grep -qE '^/-[[:space:]]+{{ smb_mount_map_path | basename }}$' /etc/auto_master"
  register: _automaster_verify
  retries: 5
  delay: 1
  until: _automaster_verify.rc == 0
  changed_when: false
