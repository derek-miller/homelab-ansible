# Tear down the autofs SMB config. The role runs as root over SSH, which can
# write /etc/auto_master directly (verified on-host), so the direct-map line
# is removed here without any manual GUI-Terminal step.

- name: remove auto_smb direct map line from /etc/auto_master
  lineinfile:
    path: /etc/auto_master
    regexp: '^/-[[:space:]]+{{ smb_mount_map_path | basename }}[[:space:]]*$'
    state: absent
  notify: reload autofs

- name: remove autofs SMB map file
  file:
    path: "{{ smb_mount_map_path }}"
    state: absent
  notify: reload autofs

- name: flush handlers
  meta: flush_handlers
