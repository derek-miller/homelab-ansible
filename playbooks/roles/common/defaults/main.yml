timezone: Etc/UTC
common_pkgs:
  apt:
    - build-essential
    - cmake
    - curl
    - git-core
    - htop
    - ifstat
    - iftop
    - iotop
    - iptraf
    - jq
    - mosh
    - net-tools
    - "{{ 'ntpsec' if (ansible_distribution == 'Debian' and ansible_distribution_major_version | int >= 12) else 'ntp' }}"
    - pigz
    - tmux
    - unzip
    - vim
  homebrew:
    # macOS ships vim, curl, git, unzip, tmux — only install tools that add
    # value over the defaults or match what Linux hosts use.
    - cmake
    - htop
    - jq
    - mosh
    - pigz
    - wget
