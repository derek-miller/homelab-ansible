- name: install build dependencies (Debian)
  apt:
    name:
      - build-essential
      - libssl-dev
      - libffi-dev
      - python3-cffi
      - python3-dev
      - python3-apt
    state: latest
  when: ansible_os_family == 'Debian'
  tags:
    - base

- name: ensure Xcode Command Line Tools are installed (Darwin)
  command: xcode-select -p
  register: xcode_select
  changed_when: false
  failed_when: xcode_select.rc not in [0, 2]
  when: ansible_os_family == 'Darwin'
  tags:
    - base

- name: install Xcode Command Line Tools (Darwin)
  command: xcode-select --install
  when:
    - ansible_os_family == 'Darwin'
    - xcode_select.rc == 2
  tags:
    - base

- name: create ansible remote dir
  file:
    path: "{{ ansible_python_dir }}"
    state: directory
  tags:
    - base

- name: copy ansible remote requirements.txt
  copy:
    src: requirements.txt
    dest: "{{ ansible_python_dir }}/requirements.txt"
    owner: "{{ root_user|default('root') }}"
    group: "{{ root_group|default('root') }}"
    mode: 0644
  tags:
    - base

- name: install ansible remote dependencies
  pip:
    virtualenv: "{{ ansible_python_virtualenv }}"
    virtualenv_command: "{{ '/usr/bin/python3 -m venv' if ansible_os_family == 'Darwin' else omit }}"
    requirements: "{{ ansible_python_dir }}/requirements.txt"
    virtualenv_site_packages: yes
    extra_args: --no-build-isolation
    state: present
  tags:
    - base

- name: set ansible python interpreter
  set_fact:
    ansible_python_interpreter: "{{ ansible_python_virtualenv }}/bin/python3"
