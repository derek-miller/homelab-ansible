- name: create ansible surrogate user
  user:
    name: "{{ ansible_surrogate_user }}"
    shell: /bin/bash
    createhome: yes
    # macOS: '*' in the password field disables interactive password auth while
    # still allowing sudo via sudoers.d. '!' (Linux convention) is interpreted
    # literally by dscl and prevents sudo.
    password: '*'

- name: ensure ansible surrogate user has SSH access (com.apple.access_ssh)
  # macOS SSH access (when Remote Login is set to "Only these users") is
  # gated by membership in the com.apple.access_ssh group — the macOS
  # equivalent of Linux's `AllowGroups ssh` + `ssh` group pattern.
  command: "dseditgroup -o edit -a {{ ansible_surrogate_user }} -t user com.apple.access_ssh"
  register: access_ssh_result
  changed_when: access_ssh_result.rc == 0
  failed_when:
    - access_ssh_result.rc != 0
    - "'is already a member' not in (access_ssh_result.stderr | default(''))"

- name: authorize ansible surrogate ssh key
  authorized_key:
    user: "{{ ansible_surrogate_user }}"
    key: "{{ item }}"
    exclusive: yes
  with_file:
    - "{{ ansible_surrogate_public_key_file }}"

- name: ensure sudoers.d directory exists
  file:
    path: "{{ sudoers_d_dir|default('/etc/sudoers.d') }}"
    owner: "{{ root_user|default('root') }}"
    group: "{{ root_group|default('wheel') }}"
    mode: 0755
    state: directory

- name: grant ansible surrogate user passwordless sudoer
  template:
    src: sudoers.d/ansible-surrogate.jinja2
    dest: "{{ sudoers_d_dir|default('/etc/sudoers.d') }}/ansible-surrogate"
    owner: "{{ root_user|default('root') }}"
    group: "{{ root_group|default('wheel') }}"
    mode: 0440
    validate: "{{ 'visudo -cf %s' }}"
